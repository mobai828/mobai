<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 - 个人博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h2><i class="fas fa-blog"></i> 个人博客</h2>
            <p>找回您的账号密码</p>
        </div>
        
        <form id="reset-password-form" onsubmit="return handleResetPassword(event)">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" class="form-control" id="email" placeholder="请输入注册时的邮箱" required>
            </div>
            <div class="form-group">
                <label>验证码</label>
                <div class="form-row">
                    <input type="text" class="form-control" id="captcha" placeholder="请输入验证码" required>
                    <button type="button" class="btn btn-secondary captcha-btn" id="send-captcha" onclick="sendCaptcha()">
                        发送验证码
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" class="form-control" id="password" placeholder="请输入新密码（至少6位）" required minlength="6">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" class="form-control" id="confirm-password" placeholder="请再次输入新密码" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                <i class="fas fa-key"></i> 重置密码
            </button>
        </form>
        
        <div class="form-footer">
            <a href="/login">返回登录</a>
        </div>
    </div>
    
    <script th:src="@{/js/app.js}"></script>
    <script>
        let captchaCountdown = 0;
        
        // 发送验证码
        async function sendCaptcha() {
            if (captchaCountdown > 0) return;
            
            const email = document.getElementById('email').value;
            if (!email) {
                Toast.warning('请输入邮箱');
                return;
            }
            
            try {
                // 使用 PASSWORD_RESET 类型发送验证码
                const result = await Auth.sendCaptcha(email, 'PASSWORD_RESET');
                if (result.success) {
                    Toast.success('验证码已发送');
                    startCountdown();
                } else {
                    Toast.error(result.message || '发送失败');
                }
            } catch (e) {
                Toast.error('发送失败，请稍后重试');
            }
        }
        
        function startCountdown() {
            captchaCountdown = 60;
            const btn = document.getElementById('send-captcha');
            const timer = setInterval(() => {
                if (captchaCountdown > 0) {
                    btn.textContent = `${captchaCountdown}s`;
                    btn.disabled = true;
                    captchaCountdown--;
                } else {
                    btn.textContent = '发送验证码';
                    btn.disabled = false;
                    clearInterval(timer);
                }
            }, 1000);
        }
        
        // 重置密码
        async function handleResetPassword(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const captcha = document.getElementById('captcha').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (password !== confirmPassword) {
                Toast.error('两次输入的密码不一致');
                return false;
            }
            
            try {
                const result = await Auth.resetPassword(email, captcha, password);
                if (result.success) {
                    Toast.success('密码重置成功，请重新登录');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    Toast.error(result.message || '重置失败');
                }
            } catch (e) {
                Toast.error('重置失败，请稍后重试');
            }
            return false;
        }
    </script>
</body>
</html>
