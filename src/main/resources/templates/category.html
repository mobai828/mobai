<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('分类')"></head>
<body>
    <nav th:replace="fragments/header :: navbar"></nav>
    
    <div class="container">
        <div class="main-content">
            <div class="content-area">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-folder"></i>
                        <span>文章分类</span>
                    </div>
                    <div class="card-body">
                        <div class="category-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;">
                            <a th:each="category : ${categories}" th:href="@{/category/{id}(id=${category.id})}" class="category-card" style="display: flex; flex-direction: column; align-items: center; padding: 30px 20px; background: var(--bg-color); border-radius: var(--radius); transition: var(--transition); text-decoration: none;">
                                <i class="fas fa-folder-open" style="font-size: 2.5rem; color: var(--primary-color); margin-bottom: 15px;"></i>
                                <h3 style="margin-bottom: 8px; color: var(--text-color);" th:text="${category.name}">分类名称</h3>
                                <span style="color: var(--text-muted); font-size: 14px;" th:text="${category.articleCount} + ' 篇文章'">0 篇文章</span>
                            </a>
                            
                            <div th:if="${#lists.isEmpty(categories)}" class="empty-state" style="grid-column: 1 / -1;">
                                <i class="fas fa-folder-open"></i>
                                <h4>暂无分类</h4>
                                <p>还没有创建任何分类</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <aside th:replace="fragments/sidebar :: sidebar"></aside>
        </div>
    </div>
    
    <footer th:replace="fragments/footer :: footer"></footer>
    <th:block th:replace="fragments/footer :: scripts"></th:block>
    
    <style>
        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            background: var(--white) !important;
        }
    </style>
</body>
</html>
