<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写文章 - 个人博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .write-container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .write-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .write-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 30px;
        }
        .title-input {
            width: 100%;
            font-size: 1.8rem;
            font-weight: 600;
            border: none;
            border-bottom: 2px solid var(--border-color);
            padding: 10px 0;
            margin-bottom: 20px;
            outline: none;
            transition: var(--transition);
        }
        .title-input:focus {
            border-color: var(--primary-color);
        }
        .editor-container {
            min-height: 400px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .editor-toolbar {
            display: flex;
            gap: 5px;
            padding: 10px;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }
        .toolbar-btn {
            padding: 8px 12px;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 4px;
            transition: var(--transition);
        }
        .toolbar-btn:hover {
            background: var(--border-color);
        }
        .editor-content {
            min-height: 350px;
            padding: 20px;
            outline: none;
            line-height: 1.8;
        }
        .article-settings {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        .settings-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .settings-item {
            flex: 1;
            min-width: 200px;
        }
        .settings-item label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .tag-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            min-height: 42px;
            align-items: center;
        }
        .tag-item {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: var(--primary-color);
            color: white;
            border-radius: 15px;
            font-size: 13px;
        }
        .tag-item .remove-tag {
            cursor: pointer;
            opacity: 0.8;
        }
        .tag-item .remove-tag:hover {
            opacity: 1;
        }
        .tag-input {
            border: none;
            outline: none;
            flex: 1;
            min-width: 100px;
        }
        .available-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .tag-suggestion {
            display: inline-block;
            padding: 4px 12px;
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
        }
        .tag-suggestion:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .cover-preview {
            width: 200px;
            height: 120px;
            border: 2px dashed var(--border-color);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            transition: var(--transition);
        }
        .cover-preview:hover {
            border-color: var(--primary-color);
        }
        .cover-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <nav th:replace="fragments/header :: navbar"></nav>
    
    <div class="write-container">
        <div class="write-header">
            <h2><i class="fas fa-pen"></i> 写文章</h2>
            <div class="action-buttons">
                <button class="btn btn-secondary" onclick="saveDraft()">
                    <i class="fas fa-save"></i> 保存草稿
                </button>
                <button class="btn btn-primary" onclick="publishArticle()">
                    <i class="fas fa-paper-plane"></i> 发布文章
                </button>
            </div>
        </div>
        
        <div class="write-card">
            <input type="text" class="title-input" id="article-title" placeholder="请输入文章标题...">
            
            <div class="editor-container">
                <div class="editor-toolbar">
                    <button class="toolbar-btn" onclick="execCmd('bold')" title="加粗"><i class="fas fa-bold"></i></button>
                    <button class="toolbar-btn" onclick="execCmd('italic')" title="斜体"><i class="fas fa-italic"></i></button>
                    <button class="toolbar-btn" onclick="execCmd('underline')" title="下划线"><i class="fas fa-underline"></i></button>
                    <button class="toolbar-btn" onclick="execCmd('strikeThrough')" title="删除线"><i class="fas fa-strikethrough"></i></button>
                    <span style="border-left: 1px solid var(--border-color); margin: 0 5px;"></span>
                    <button class="toolbar-btn" onclick="execCmd('formatBlock', 'h1')" title="标题1">H1</button>
                    <button class="toolbar-btn" onclick="execCmd('formatBlock', 'h2')" title="标题2">H2</button>
                    <button class="toolbar-btn" onclick="execCmd('formatBlock', 'h3')" title="标题3">H3</button>
                    <span style="border-left: 1px solid var(--border-color); margin: 0 5px;"></span>
                    <button class="toolbar-btn" onclick="execCmd('insertUnorderedList')" title="无序列表"><i class="fas fa-list-ul"></i></button>
                    <button class="toolbar-btn" onclick="execCmd('insertOrderedList')" title="有序列表"><i class="fas fa-list-ol"></i></button>
                    <button class="toolbar-btn" onclick="execCmd('formatBlock', 'blockquote')" title="引用"><i class="fas fa-quote-left"></i></button>
                    <span style="border-left: 1px solid var(--border-color); margin: 0 5px;"></span>
                    <button class="toolbar-btn" onclick="insertLink()" title="插入链接"><i class="fas fa-link"></i></button>
                    <button class="toolbar-btn" onclick="insertImage()" title="插入图片"><i class="fas fa-image"></i></button>
                    <button class="toolbar-btn" onclick="insertCode()" title="插入代码"><i class="fas fa-code"></i></button>
                </div>
                <div class="editor-content" id="editor" contenteditable="true" placeholder="开始写作..."></div>
            </div>
            
            <div class="article-settings">
                <div class="settings-row">
                    <div class="settings-item">
                        <label>分类</label>
                        <select class="form-control" id="article-category">
                            <option value="">请选择分类</option>
                            <option th:each="category : ${categories}" 
                                    th:value="${category.id}" 
                                    th:text="${category.name}"></option>
                        </select>
                    </div>
                    <div class="settings-item">
                        <label>封面图</label>
                        <div class="cover-preview" onclick="document.getElementById('cover-input').click()">
                            <span id="cover-placeholder"><i class="fas fa-image"></i> 点击上传</span>
                            <img id="cover-preview-img" src="" alt="" style="display: none;">
                        </div>
                        <input type="file" id="cover-input" accept="image/*" style="display: none;">
                    </div>
                </div>
                <div class="settings-row">
                    <div class="settings-item">
                        <label>标签</label>
                        <div class="tag-input-container" id="tag-container">
                            <input type="text" class="tag-input" id="tag-input" placeholder="输入标签后按回车或选择已有标签">
                        </div>
                        <div class="available-tags" style="margin-top: 10px;">
                            <span class="tag-suggestion" 
                                  th:each="tag : ${tags}" 
                                  th:text="${tag.name}" 
                                  th:attr="data-tag-id=${tag.id}, data-tag-name=${tag.name}"
                                  onclick="selectTag(this.getAttribute('data-tag-id'), this.getAttribute('data-tag-name'))"></span>
                        </div>
                    </div>
                </div>
                <div class="settings-row">
                    <div class="settings-item" style="flex: none;">
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="checkbox" id="is-top"> 置顶文章
                        </label>
                    </div>
                    <div class="settings-item" style="flex: none;">
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="checkbox" id="allow-comment" checked> 允许评论
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/app.js}"></script>
    <script>
        let selectedTags = [];
        let coverUrl = '';
        let articleId = null;
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            if (!Utils.isLoggedIn()) {
                window.location.href = '/login';
                return;
            }
            
            // 检查URL参数是否有id
            const urlParams = new URLSearchParams(window.location.search);
            articleId = urlParams.get('id');
            
            bindTagInput();
            bindCoverUpload();
            
            if (articleId) {
                loadArticle(articleId);
            }
        });
        
        // 加载文章数据
        async function loadArticle(id) {
            try {
                const result = await Api.get('/api/articles/' + id);
                if (result.success) {
                    const article = result.data;
                    
                    // 填充标题
                    document.getElementById('article-title').value = article.title;
                    
                    // 填充内容
                    document.getElementById('editor').innerHTML = article.content || article.htmlContent;
                    
                    // 填充分类
                    if (article.categoryId) {
                        document.getElementById('article-category').value = article.categoryId;
                    }
                    
                    // 填充封面
                    if (article.cover) {
                        coverUrl = article.cover;
                        document.getElementById('cover-preview-img').src = article.cover;
                        document.getElementById('cover-preview-img').style.display = 'block';
                        document.getElementById('cover-placeholder').style.display = 'none';
                    }
                    
                    // 填充置顶和评论设置
                    document.getElementById('is-top').checked = (article.isTop === 1);
                    document.getElementById('allow-comment').checked = article.allowComment;
                    
                    // 填充标签
                    if (article.tags && article.tags.length > 0) {
                        selectedTags = article.tags.map(tag => ({
                            id: tag.id,
                            name: tag.name
                        }));
                        renderTags();
                    }
                } else {
                    Toast.error('加载文章失败');
                }
            } catch (e) {
                console.error(e);
                Toast.error('加载文章失败');
            }
        }
        
        // ... (保持原来的 execCmd 等辅助函数不变) ...
        
        // 编辑器命令
        function execCmd(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('editor').focus();
        }
        
        // 插入链接
        function insertLink() {
            const url = prompt('请输入链接地址:');
            if (url) {
                execCmd('createLink', url);
            }
        }
        
        // 插入图片
        function insertImage() {
            const url = prompt('请输入图片地址:');
            if (url) {
                execCmd('insertImage', url);
            }
        }
        
        // 插入代码
        function insertCode() {
            const code = prompt('请输入代码:');
            if (code) {
                execCmd('insertHTML', `<pre><code>${code}</code></pre>`);
            }
        }
        
        // 解析页面上已有的标签数据
        function getAvailableTags() {
            const tags = {};
            document.querySelectorAll('.tag-suggestion').forEach(el => {
                const id = parseInt(el.getAttribute('data-tag-id'));
                const name = el.getAttribute('data-tag-name');
                if (id && name) {
                    tags[name] = id;
                }
            });
            return tags;
        }

        // 处理新标签（创建不存在的标签）
        async function processNewTags() {
            const newTags = selectedTags.filter(t => !t.id);
            if (newTags.length === 0) return true;

            // 显示处理中提示，因为这可能需要一点时间
            const submitBtn = document.querySelector('.btn-primary');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 处理标签...';
            submitBtn.disabled = true;

            try {
                for (let tag of newTags) {
                    try {
                        const result = await Api.post('/api/articles/tags', { name: tag.name });
                        if (result && result.success && result.data && result.data.id) {
                             tag.id = result.data.id;
                        }
                    } catch (e) {
                        console.error('Error creating tag', tag.name, e);
                    }
                }
            } finally {
                // 恢复按钮状态
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }

        // 标签输入
        function bindTagInput() {
            const input = document.getElementById('tag-input');
            const container = document.getElementById('tag-container');
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const tagName = input.value.trim();
                    if (tagName) {
                        // 检查是否已选择该标签
                        const exists = selectedTags.some(tag => tag.name === tagName);
                        if (!exists) {
                            // 尝试从已有标签中查找ID
                            const availableTags = getAvailableTags();
                            const existingId = availableTags[tagName] || null;
                            
                            // 新建标签，如果有ID则使用ID，否则为null
                            selectedTags.push({id: existingId, name: tagName});
                            renderTags();
                        }
                        input.value = '';
                    }
                }
            });
        }
        
        // 选择已有标签
        function selectTag(tagId, tagName) {
            // 转换为数字类型，确保比较正确
            const id = parseInt(tagId);
            // 检查是否已选择该标签
            const exists = selectedTags.some(tag => tag.id === id);
            if (!exists) {
                selectedTags.push({id: id, name: tagName});
                renderTags();
            }
        }
        
        function renderTags() {
            const container = document.getElementById('tag-container');
            const input = document.getElementById('tag-input');
            
            // 移除旧标签
            container.querySelectorAll('.tag-item').forEach(el => el.remove());
            
            // 添加新标签
            selectedTags.forEach((tag, index) => {
                const tagEl = document.createElement('span');
                tagEl.className = 'tag-item';
                tagEl.innerHTML = `${tag.name} <i class="fas fa-times remove-tag" onclick="removeTag(${index})"></i>`;
                container.insertBefore(tagEl, input);
            });
        }
        
        function removeTag(index) {
            selectedTags.splice(index, 1);
            renderTags();
        }
        
        // 封面上传
        function bindCoverUpload() {
            const input = document.getElementById('cover-input');
            input.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                // 预览
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('cover-preview-img').src = e.target.result;
                    document.getElementById('cover-preview-img').style.display = 'block';
                    document.getElementById('cover-placeholder').style.display = 'none';
                };
                reader.readAsDataURL(file);
                
                // 上传
                const formData = new FormData();
                formData.append('file', file);
                
                try {
                    const response = await fetch('/api/files/upload', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${Utils.getToken()}`
                        },
                        body: formData
                    });
                    const result = await response.json();
                    if (result.success) {
                        coverUrl = '/api/files/download/' + result.fileName;
                        Toast.success('封面上传成功');
                    } else {
                        Toast.error(result.message || '上传失败');
                    }
                } catch (e) {
                    Toast.error('上传失败');
                }
            });
        }
        
        // 获取文章数据
        function getArticleData() {
            const title = document.getElementById('article-title').value.trim();
            const content = document.getElementById('editor').innerHTML;
            const categoryId = document.getElementById('article-category').value;
            const isTop = document.getElementById('is-top').checked ? 1 : 0;
            const allowComment = document.getElementById('allow-comment').checked;
            
            if (!title) {
                Toast.warning('请输入文章标题');
                return null;
            }
            
            if (!content || content === '<br>') {
                Toast.warning('请输入文章内容');
                return null;
            }
            
            // 处理标签ID
            const tagIds = [];
            
            selectedTags.forEach(tag => {
                if (tag.id) {
                    tagIds.push(tag.id);
                }
            });
            
            return {
                title,
                content,
                htmlContent: content,
                categoryId: categoryId || null,
                cover: coverUrl || null,
                isTop,
                allowComment,
                tagIds: tagIds
            };
        }
        
        // 保存草稿
        async function saveDraft() {
            // 先处理新标签
            await processNewTags();

            const data = getArticleData();
            if (!data) return;
            
            data.status = 0; // 草稿状态
            
            try {
                let result;
                if (articleId) {
                    result = await Api.put('/api/articles/' + articleId, data);
                } else {
                    result = await Api.post('/api/articles', data);
                }
                
                if (result.success) {
                    Toast.success('草稿保存成功');
                    if (!articleId && result.data && result.data.id) {
                         articleId = result.data.id;
                         history.replaceState(null, null, `?id=${articleId}`);
                    }
                } else {
                    Toast.error(result.message || '保存失败');
                }
            } catch (e) {
                Toast.error('保存失败');
            }
        }
        
        // 发布文章
        async function publishArticle() {
            // 先处理新标签
            await processNewTags();

            const data = getArticleData();
            if (!data) return;
            
            data.status = 1; // 发布状态
            
            try {
                let result;
                if (articleId) {
                    result = await Api.put('/api/articles/' + articleId, data);
                } else {
                    result = await Api.post('/api/articles', data);
                }
                
                if (result.success) {
                    Toast.success('文章发布成功');
                    setTimeout(() => {
                        window.location.href = '/article/' + (result.data ? result.data.id : articleId);
                    }, 1500);
                } else {
                    Toast.error(result.message || '发布失败');
                }
            } catch (e) {
                Toast.error('发布失败');
            }
        }
    </script>
</body>
</html>
