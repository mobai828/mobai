<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 个人博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">
    <div class="admin-container">
        <!-- 侧边栏 -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <a href="/" class="logo">
                    <i class="fas fa-blog"></i>
                    <span>博客管理</span>
                </a>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin" class="nav-item active">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>仪表盘</span>
                </a>
                <a href="/admin/articles" class="nav-item">
                    <i class="fas fa-file-alt"></i>
                    <span>文章管理</span>
                </a>
                <a href="/admin/categories" class="nav-item">
                    <i class="fas fa-folder"></i>
                    <span>分类管理</span>
                </a>
                <a href="/admin/tags" class="nav-item">
                    <i class="fas fa-tags"></i>
                    <span>标签管理</span>
                </a>
                <a href="/admin/comments" class="nav-item">
                    <i class="fas fa-comments"></i>
                    <span>评论管理</span>
                </a>
                <a href="/admin/users" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>用户管理</span>
                </a>
                <a href="/admin/links" class="nav-item">
                    <i class="fas fa-link"></i>
                    <span>友链管理</span>
                </a>
                <a href="/admin/settings" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>系统设置</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="/" target="_blank"><i class="fas fa-external-link-alt"></i> 访问前台</a>
            </div>
        </aside>
        
        <!-- 主内容区 -->
        <main class="admin-main">
            <header class="admin-header">
                <div class="header-left">
                    <button class="toggle-sidebar" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>仪表盘</h1>
                </div>
                <div class="header-right">
                    <div class="admin-user">
                        <img id="admin-avatar" src="/images/default-avatar.svg" alt="头像">
                        <span id="admin-name">管理员</span>
                        <div class="admin-dropdown">
                            <a href="/profile"><i class="fas fa-user"></i> 个人中心</a>
                            <a href="javascript:void(0)" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出登录</a>
                        </div>
                    </div>
                </div>
            </header>
            
            <div class="admin-content">
                <!-- 统计卡片 -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                            <i class="fas fa-file-alt"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-articles">0</h3>
                            <p>文章数</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #f093fb, #f5576c);">
                            <i class="fas fa-eye"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-views">0</h3>
                            <p>总浏览量</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">
                            <i class="fas fa-comments"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-comments">0</h3>
                            <p>评论数</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #43e97b, #38f9d7);">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="stat-users">0</h3>
                            <p>用户数</p>
                        </div>
                    </div>
                </div>
                
                <!-- 快捷操作 -->
                <div class="quick-actions">
                    <h3><i class="fas fa-bolt"></i> 快捷操作</h3>
                    <div class="action-grid">
                        <a href="/write-article" class="action-item">
                            <i class="fas fa-pen"></i>
                            <span>写文章</span>
                        </a>
                        <a href="/admin/categories" class="action-item">
                            <i class="fas fa-folder-plus"></i>
                            <span>添加分类</span>
                        </a>
                        <a href="/admin/tags" class="action-item">
                            <i class="fas fa-tag"></i>
                            <span>添加标签</span>
                        </a>
                        <a href="/admin/comments" class="action-item">
                            <i class="fas fa-comment-dots"></i>
                            <span>审核评论</span>
                        </a>
                    </div>
                </div>
                
                <!-- 最近文章和评论 -->
                <div class="dashboard-grid">
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h3><i class="fas fa-file-alt"></i> 最近文章</h3>
                            <a href="/admin/articles">查看全部</a>
                        </div>
                        <div class="card-body">
                            <ul class="recent-list" id="recent-articles">
                                <li class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</li>
                            </ul>
                        </div>
                    </div>
                    <div class="dashboard-card">
                        <div class="card-header">
                            <h3><i class="fas fa-comments"></i> 最近评论</h3>
                            <a href="/admin/comments">查看全部</a>
                        </div>
                        <div class="card-body">
                            <ul class="recent-list" id="recent-comments">
                                <li class="loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script th:src="@{/js/app.js}"></script>
    <script>
        // 页面加载
        document.addEventListener('DOMContentLoaded', async () => {
            if (!Utils.isLoggedIn()) {
                window.location.href = '/login';
                return;
            }
            
            const user = Utils.getUser();
            if (user) {
                document.getElementById('admin-name').textContent = user.nickname || user.username;
                if (user.avatar) {
                    document.getElementById('admin-avatar').src = user.avatar;
                }
            }
            
            await loadDashboardData();
        });
        
        // 加载仪表盘数据
        async function loadDashboardData() {
            try {
                const result = await Api.get('/api/admin/statistics');
                if (result.success) {
                    const data = result.data;
                    document.getElementById('stat-articles').textContent = data.articleCount || 0;
                    document.getElementById('stat-views').textContent = data.totalViews || 0;
                    document.getElementById('stat-comments').textContent = data.commentCount || 0;
                    document.getElementById('stat-users').textContent = data.userCount || 0;
                }
            } catch (e) {
                console.error('加载统计数据失败:', e);
            }
            
            // 加载最近文章
            try {
                const result = await Api.get('/api/articles/latest?limit=5');
                if (result.success && result.data) {
                    const list = document.getElementById('recent-articles');
                    if (result.data.length === 0) {
                        list.innerHTML = '<li class="empty">暂无文章</li>';
                    } else {
                        list.innerHTML = result.data.map(article => `
                            <li>
                                <a href="/article/${article.id}">${article.title}</a>
                                <span class="time">${Utils.timeAgo(article.createTime)}</span>
                            </li>
                        `).join('');
                    }
                }
            } catch (e) {
                document.getElementById('recent-articles').innerHTML = '<li class="error">加载失败</li>';
            }
            
            // 加载最近评论
            try {
                const result = await Api.get('/api/admin/comments?page=0&size=5');
                if (result.success && result.data) {
                    const list = document.getElementById('recent-comments');
                    if (result.data.length === 0) {
                        list.innerHTML = '<li class="empty">暂无评论</li>';
                    } else {
                        list.innerHTML = result.data.map(comment => `
                            <li>
                                <div class="comment-info">
                                    <span class="author">${comment.nickname || '匿名'}</span>
                                    <span class="content">${comment.content.substring(0, 50)}...</span>
                                </div>
                                <span class="time">${Utils.timeAgo(comment.createTime)}</span>
                            </li>
                        `).join('');
                    }
                }
            } catch (e) {
                document.getElementById('recent-comments').innerHTML = '<li class="error">加载失败</li>';
            }
        }
        
        // 切换侧边栏
        function toggleSidebar() {
            document.querySelector('.admin-container').classList.toggle('sidebar-collapsed');
        }
        
        // 退出登录
        function logout() {
            Auth.logout();
        }
    </script>
</body>
</html>
