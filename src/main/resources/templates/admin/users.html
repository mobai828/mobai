<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 个人博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <a href="/" class="logo"><i class="fas fa-blog"></i><span>博客管理</span></a>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>仪表盘</span></a>
                <a href="/admin/articles" class="nav-item"><i class="fas fa-file-alt"></i><span>文章管理</span></a>
                <a href="/admin/categories" class="nav-item"><i class="fas fa-folder"></i><span>分类管理</span></a>
                <a href="/admin/tags" class="nav-item"><i class="fas fa-tags"></i><span>标签管理</span></a>
                <a href="/admin/comments" class="nav-item"><i class="fas fa-comments"></i><span>评论管理</span></a>
                <a href="/admin/users" class="nav-item active"><i class="fas fa-users"></i><span>用户管理</span></a>
                <a href="/admin/links" class="nav-item"><i class="fas fa-link"></i><span>友链管理</span></a>
                <a href="/admin/settings" class="nav-item"><i class="fas fa-cog"></i><span>系统设置</span></a>
            </nav>
        </aside>
        
        <main class="admin-main">
            <header class="admin-header">
                <div class="header-left">
                    <button class="toggle-sidebar" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <h1>用户管理</h1>
                </div>
            </header>
            
            <div class="admin-content">
                <div class="admin-table-card">
                    <div class="table-header">
                        <h3>用户列表</h3>
                    </div>
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>头像</th>
                                <th>用户名</th>
                                <th>邮箱</th>
                                <th>角色</th>
                                <th>状态</th>
                                <th>注册时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="user-list">
                            <tr><td colspan="8" class="text-center">加载中...</td></tr>
                        </tbody>
                    </table>
                    <div class="admin-pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>
    
    <script th:src="@{/js/app.js}"></script>
    <script>
        let currentPage = 0;
        let totalPages = 0;
        
        document.addEventListener('DOMContentLoaded', () => {
            if (!Utils.isLoggedIn()) {
                window.location.href = '/login';
                return;
            }
            loadUsers();
        });
        
        async function loadUsers(page = 0) {
            currentPage = page;
            try {
                const result = await Api.get(`/api/admin/users?page=${page}&size=10`);
                if (result.success) {
                    totalPages = result.totalPages || 0;
                    renderUsers(result.data || []);
                    renderPagination();
                } else {
                    document.getElementById('user-list').innerHTML = '<tr><td colspan="8" class="text-center">加载失败: ' + (result.message || '未知错误') + '</td></tr>';
                }
            } catch (e) {
                console.error('加载用户失败:', e);
                document.getElementById('user-list').innerHTML = '<tr><td colspan="8" class="text-center">加载失败，请确保已登录管理员账号</td></tr>';
            }
        }
        
        function renderUsers(users) {
            const tbody = document.getElementById('user-list');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center">暂无用户</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.id}</td>
                    <td><img src="${user.avatar || '/images/default-avatar.svg'}" alt="头像" style="width: 36px; height: 36px; border-radius: 50%;"></td>
                    <td>${user.username}</td>
                    <td>${user.email}</td>
                    <td><span class="status-badge ${user.role === 'ADMIN' ? 'published' : 'pending'}">${user.role === 'ADMIN' ? '管理员' : '用户'}</span></td>
                    <td><span class="status-badge ${user.status === 1 ? 'approved' : 'rejected'}">${user.status === 1 ? '正常' : '禁用'}</span></td>
                    <td>${Utils.formatDate(user.createTime)}</td>
                    <td class="actions">
                        <button class="btn-edit" onclick="toggleUserStatus(${user.id}, ${user.status})" title="${user.status === 1 ? '禁用' : '启用'}">
                            <i class="fas fa-${user.status === 1 ? 'ban' : 'check'}"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function renderPagination() {
            const container = document.getElementById('pagination');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = `<button ${currentPage === 0 ? 'disabled' : ''} onclick="loadUsers(${currentPage - 1})"><i class="fas fa-chevron-left"></i></button>`;
            for (let i = 0; i < totalPages; i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="loadUsers(${i})">${i + 1}</button>`;
            }
            html += `<button ${currentPage >= totalPages - 1 ? 'disabled' : ''} onclick="loadUsers(${currentPage + 1})"><i class="fas fa-chevron-right"></i></button>`;
            container.innerHTML = html;
        }
        
        async function toggleUserStatus(id, currentStatus) {
            const action = currentStatus === 1 ? '禁用' : '启用';
            if (!confirm(`确定要${action}这个用户吗？`)) return;
            
            try {
                await Api.put(`/api/admin/users/${id}/status`, { status: currentStatus === 1 ? 0 : 1 });
                Toast.success(`${action}成功`);
                loadUsers(currentPage);
            } catch (e) {
                Toast.error('操作失败');
            }
        }
        
        function toggleSidebar() {
            document.querySelector('.admin-container').classList.toggle('sidebar-collapsed');
        }
    </script>
</body>
</html>
