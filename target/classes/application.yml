storage:
  location: ./uploads
  cloud-provider: local
  # 如果使用云存储，请取消注释并填写以下配置
  #cloud-access-key: your-access-key
  #cloud-secret-key: your-secret-key
  #cloud-bucket-name: your-bucket-name
  #cloud-endpoint: your-endpoint

# Gitee OAuth 配置
gitee:
  client-id: your-gitee-client-id
  client-secret: your-gitee-client-secret
  redirect-uri: http://localhost:8081/api/auth/callback/gitee
  authorization-url: https://gitee.com/oauth/authorize
  token-url: https://gitee.com/oauth/token
  user-info-url: https://gitee.com/api/v5/user

# 博客配置
blog:
  comment:
    moderation: true  # 是否启用评论审核
    anonymous: false  # 是否允许匿名评论
  admin:
    email: admin@example.com  # 管理员邮箱

# 禁用 Actuator JMX 端点
management:
  endpoints:
    jmx:
      exposure:
        exclude: "*"

logging:
  level:
    root: INFO
    com.example.blog: INFO
