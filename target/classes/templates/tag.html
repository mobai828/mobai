<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('标签')"></head>
<body>
    <nav th:replace="fragments/header :: navbar"></nav>
    
    <div class="container">
        <div class="main-content">
            <div class="content-area">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-tags"></i>
                        <span>文章标签</span>
                    </div>
                    <div class="card-body">
                        <div class="tag-cloud-large" style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;">
                            <a th:each="tag : ${tags}" th:href="@{/tag/{id}(id=${tag.id})}" class="tag-item" 
                               style="padding: 12px 24px; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; border-radius: 25px; font-size: 14px; transition: var(--transition); text-decoration: none;">
                                <i class="fas fa-tag"></i>
                                <span th:text="${tag.name}">标签名称</span>
                            </a>
                            
                            <div th:if="${#lists.isEmpty(tags)}" class="empty-state" style="width: 100%;">
                                <i class="fas fa-tags"></i>
                                <h4>暂无标签</h4>
                                <p>还没有创建任何标签</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <aside th:replace="fragments/sidebar :: sidebar"></aside>
        </div>
    </div>
    
    <footer th:replace="fragments/footer :: footer"></footer>
    <th:block th:replace="fragments/footer :: scripts"></th:block>
    
    <style>
        .tag-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</body>
</html>
