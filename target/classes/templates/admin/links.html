<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友链管理 - 个人博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <a href="/" class="logo"><i class="fas fa-blog"></i><span>博客管理</span></a>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>仪表盘</span></a>
                <a href="/admin/articles" class="nav-item"><i class="fas fa-file-alt"></i><span>文章管理</span></a>
                <a href="/admin/categories" class="nav-item"><i class="fas fa-folder"></i><span>分类管理</span></a>
                <a href="/admin/tags" class="nav-item"><i class="fas fa-tags"></i><span>标签管理</span></a>
                <a href="/admin/comments" class="nav-item"><i class="fas fa-comments"></i><span>评论管理</span></a>
                <a href="/admin/users" class="nav-item"><i class="fas fa-users"></i><span>用户管理</span></a>
                <a href="/admin/links" class="nav-item active"><i class="fas fa-link"></i><span>友链管理</span></a>
                <a href="/admin/settings" class="nav-item"><i class="fas fa-cog"></i><span>系统设置</span></a>
            </nav>
        </aside>
        
        <main class="admin-main">
            <header class="admin-header">
                <div class="header-left">
                    <button class="toggle-sidebar" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <h1>友链管理</h1>
                </div>
            </header>
            
            <div class="admin-content">
                <div class="admin-table-card">
                    <div class="table-header">
                        <h3>友链列表</h3>
                        <button class="btn btn-primary" onclick="showAddModal()"><i class="fas fa-plus"></i> 添加友链</button>
                    </div>
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Logo</th>
                                <th>名称</th>
                                <th>链接</th>
                                <th>描述</th>
                                <th>状态</th>
                                <th>排序</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="link-list">
                            <tr><td colspan="8" class="text-center">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 添加/编辑弹窗 -->
    <div class="admin-modal" id="link-modal">
        <div class="modal-content" style="width: 600px;">
            <div class="modal-header">
                <h3 id="modal-title">添加友链</h3>
                <button class="modal-close" onclick="hideModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="link-form">
                    <input type="hidden" id="link-id">
                    <div class="form-group">
                        <label>名称 *</label>
                        <input type="text" class="form-control" id="link-name" required>
                    </div>
                    <div class="form-group">
                        <label>链接 *</label>
                        <input type="url" class="form-control" id="link-url" placeholder="https://" required>
                    </div>
                    <div class="form-group">
                        <label>Logo</label>
                        <input type="url" class="form-control" id="link-logo" placeholder="https://">
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <textarea class="form-control" id="link-description" rows="2"></textarea>
                    </div>
                    <div style="display: flex; gap: 15px;">
                        <div class="form-group" style="flex: 1;">
                            <label>排序</label>
                            <input type="number" class="form-control" id="link-sort" value="0">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>状态</label>
                            <select class="form-control" id="link-status">
                                <option value="1">显示</option>
                                <option value="0">隐藏</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hideModal()">取消</button>
                <button class="btn btn-primary" onclick="saveLink()">保存</button>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/app.js}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Utils.isLoggedIn()) {
                window.location.href = '/login';
                return;
            }
            loadLinks();
        });
        
        async function loadLinks() {
            try {
                const result = await Api.get('/api/admin/links');
                if (result.success) {
                    renderLinks(result.data);
                }
            } catch (e) {
                document.getElementById('link-list').innerHTML = '<tr><td colspan="8" class="text-center">加载失败</td></tr>';
            }
        }
        
        function renderLinks(links) {
            const tbody = document.getElementById('link-list');
            if (!links || links.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center">暂无友链</td></tr>';
                return;
            }
            
            tbody.innerHTML = links.map(link => `
                <tr>
                    <td>${link.id}</td>
                    <td><img src="${link.logo || '/images/default-avatar.svg'}" alt="Logo" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;"></td>
                    <td>${link.name}</td>
                    <td><a href="${link.url}" target="_blank">${link.url.substring(0, 30)}...</a></td>
                    <td style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${link.description || '-'}</td>
                    <td><span class="status-badge ${link.status === 1 ? 'approved' : 'rejected'}">${link.status === 1 ? '显示' : '隐藏'}</span></td>
                    <td>${link.sortOrder || 0}</td>
                    <td class="actions">
                        <button class="btn-edit" onclick='editLink(${JSON.stringify(link)})'><i class="fas fa-edit"></i></button>
                        <button class="btn-delete" onclick="deleteLink(${link.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }
        
        function showAddModal() {
            document.getElementById('modal-title').textContent = '添加友链';
            document.getElementById('link-id').value = '';
            document.getElementById('link-form').reset();
            document.getElementById('link-modal').classList.add('show');
        }
        
        function editLink(link) {
            document.getElementById('modal-title').textContent = '编辑友链';
            document.getElementById('link-id').value = link.id;
            document.getElementById('link-name').value = link.name;
            document.getElementById('link-url').value = link.url;
            document.getElementById('link-logo').value = link.logo || '';
            document.getElementById('link-description').value = link.description || '';
            document.getElementById('link-sort').value = link.sortOrder || 0;
            document.getElementById('link-status').value = link.status;
            document.getElementById('link-modal').classList.add('show');
        }
        
        function hideModal() {
            document.getElementById('link-modal').classList.remove('show');
        }
        
        async function saveLink() {
            const id = document.getElementById('link-id').value;
            const data = {
                name: document.getElementById('link-name').value.trim(),
                url: document.getElementById('link-url').value.trim(),
                logo: document.getElementById('link-logo').value.trim() || null,
                description: document.getElementById('link-description').value.trim() || null,
                sortOrder: parseInt(document.getElementById('link-sort').value) || 0,
                status: parseInt(document.getElementById('link-status').value)
            };
            
            if (!data.name || !data.url) {
                Toast.warning('请填写名称和链接');
                return;
            }
            
            try {
                if (id) {
                    await Api.put(`/api/admin/links/${id}`, data);
                    Toast.success('更新成功');
                } else {
                    await Api.post('/api/admin/links', data);
                    Toast.success('添加成功');
                }
                hideModal();
                loadLinks();
            } catch (e) {
                Toast.error('操作失败');
            }
        }
        
        async function deleteLink(id) {
            if (!confirm('确定要删除这个友链吗？')) return;
            try {
                await Api.delete(`/api/admin/links/${id}`);
                Toast.success('删除成功');
                loadLinks();
            } catch (e) {
                Toast.error('删除失败');
            }
        }
        
        function toggleSidebar() {
            document.querySelector('.admin-container').classList.toggle('sidebar-collapsed');
        }
    </script>
</body>
</html>
