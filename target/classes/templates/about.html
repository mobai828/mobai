<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head('关于')"></head>
<body>
    <nav th:replace="fragments/header :: navbar"></nav>
    
    <div class="container">
        <div class="main-content">
            <div class="content-area">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-user"></i>
                        <span>关于我</span>
                    </div>
                    <div class="card-body">
                        <div class="about-content" style="max-width: 800px; margin: 0 auto;">
                            <div class="about-avatar" style="text-align: center; margin-bottom: 30px;">
                                <img src="/images/default-avatar.svg" alt="头像" style="width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary-color);">
                                <h2 style="margin-top: 15px;">博主</h2>
                                <p style="color: var(--text-muted);">热爱技术，热爱生活</p>
                            </div>
                            
                            <div class="about-intro" style="line-height: 1.8; color: var(--text-light);">
                                <h3 style="margin-bottom: 15px; color: var(--text-color);"><i class="fas fa-info-circle"></i> 简介</h3>
                                <p style="margin-bottom: 20px;">
                                    欢迎来到我的个人博客！这里是我记录技术学习、分享生活感悟的地方。
                                </p>
                                <p style="margin-bottom: 20px;">
                                    我是一名热爱编程的开发者，主要从事后端开发工作。平时喜欢研究新技术，
                                    也会在这里分享一些学习心得和项目经验。
                                </p>
                                
                                <h3 style="margin: 30px 0 15px; color: var(--text-color);"><i class="fas fa-code"></i> 技术栈</h3>
                                <div class="tech-stack" style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;">
                                    <span class="tech-tag" style="padding: 5px 15px; background: var(--bg-color); border-radius: 15px; font-size: 14px;">Java</span>
                                    <span class="tech-tag" style="padding: 5px 15px; background: var(--bg-color); border-radius: 15px; font-size: 14px;">Spring Boot</span>
                                    <span class="tech-tag" style="padding: 5px 15px; background: var(--bg-color); border-radius: 15px; font-size: 14px;">MySQL</span>
                                    <span class="tech-tag" style="padding: 5px 15px; background: var(--bg-color); border-radius: 15px; font-size: 14px;">Redis</span>
                                    <span class="tech-tag" style="padding: 5px 15px; background: var(--bg-color); border-radius: 15px; font-size: 14px;">JavaScript</span>
                                    <span class="tech-tag" style="padding: 5px 15px; background: var(--bg-color); border-radius: 15px; font-size: 14px;">Vue.js</span>
                                </div>
                                
                                <h3 style="margin: 30px 0 15px; color: var(--text-color);"><i class="fas fa-envelope"></i> 联系方式</h3>
                                <ul style="list-style: none;">
                                    <li style="margin-bottom: 10px;">
                                        <i class="fas fa-envelope" style="width: 20px; color: var(--primary-color);"></i>
                                        <a href="mailto:admin@example.com">admin@example.com</a>
                                    </li>
                                    <li style="margin-bottom: 10px;">
                                        <i class="fab fa-github" style="width: 20px; color: var(--primary-color);"></i>
                                        <a href="https://github.com" target="_blank">GitHub</a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <aside th:replace="fragments/sidebar :: sidebar"></aside>
        </div>
    </div>
    
    <footer th:replace="fragments/footer :: footer"></footer>
    <th:block th:replace="fragments/footer :: scripts"></th:block>
</body>
</html>
