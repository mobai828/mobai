<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: head(${article.title})"></head>
<body>
    <nav th:replace="fragments/header :: navbar"></nav>
    
    <div class="container">
        <div class="main-content">
            <div class="content-area">
                <article class="article-detail">
                    <header class="article-detail-header">
                        <h1 class="article-detail-title" th:text="${article.title}">文章标题</h1>
                        <div class="article-detail-meta">
                            <span><i class="fas fa-calendar"></i> <span th:text="${#temporals.format(article.createTime, 'yyyy-MM-dd HH:mm')}">2024-01-01</span></span>
                            <span><i class="fas fa-eye"></i> <span th:text="${article.viewCount}">0</span> 阅读</span>
                            <span><i class="fas fa-heart"></i> <span th:text="${article.likeCount}">0</span> 点赞</span>
                            <span th:if="${article.categoryId}"><i class="fas fa-folder"></i> 分类</span>
                            <!-- 标签展示 -->
                            <span class="article-tags" th:if="${tags != null && !tags.isEmpty()}">
                                <span th:each="tag : ${tags}" class="badge badge-tag" style="background-color: #ff9f43; color: white; margin-left: 10px; font-size: 0.8em; padding: 2px 8px; border-radius: 12px; vertical-align: middle;">
                                    <i class="fas fa-tag" style="font-size: 0.9em; margin-right: 3px;"></i>
                                    <span th:text="${tag.name}">标签名</span>
                                </span>
                            </span>
                        </div>
                    </header>
                    
                    <div class="article-detail-content" th:utext="${article.htmlContent != null ? article.htmlContent : article.content}">
                        文章内容...
                    </div>
                    
                    <div class="article-actions">
                        <button class="action-btn" id="like-btn" onclick="toggleLike()">
                            <i class="fas fa-heart"></i>
                            <span id="like-count" th:text="${article.likeCount}">0</span>
                        </button>
                        <button class="action-btn" onclick="shareArticle()">
                            <i class="fas fa-share-alt"></i>
                            <span>分享</span>
                        </button>
                    </div>
                </article>
                
                <!-- 评论区 -->
                <section class="comment-section" th:if="${article.allowComment}">
                    <h3><i class="fas fa-comments"></i> 评论 (<span id="comment-count" th:text="${#lists.size(comments)}">0</span>)</h3>
                    
                    <div class="comment-form" id="comment-form">
                        <textarea id="comment-content" placeholder="写下你的评论..."></textarea>
                        <div class="comment-form-actions">
                            <button class="btn btn-primary" onclick="submitComment()">
                                <i class="fas fa-paper-plane"></i> 发表评论
                            </button>
                        </div>
                    </div>
                    
                    <ul class="comment-list" id="comment-list">
                        <li th:each="comment : ${comments}" class="comment-item" th:id="'comment-' + ${comment.id}">
                            <div class="comment-header">
                                <img th:src="${comment.avatar != null ? comment.avatar : '/images/default-avatar.svg'}" alt="头像" class="comment-avatar">
                                <div>
                                    <span class="comment-author" th:text="${comment.nickname != null ? comment.nickname : '匿名用户'}">用户名</span>
                                    <span class="comment-time" th:text="${#temporals.format(comment.createTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                                </div>
                            </div>
                            <div class="comment-content" th:text="${comment.content}">评论内容</div>
                            <div class="comment-actions">
                                <span class="comment-reply-btn" 
                                      th:data-id="${comment.id}" 
                                      th:data-nickname="${comment.nickname}"
                                      onclick="replyTo(this.getAttribute('data-id'), this.getAttribute('data-nickname'))">
                                    <i class="fas fa-reply"></i> 回复
                                </span>
                            </div>
                            
                            <!-- 子评论 -->
                            <div class="comment-replies" th:if="${comment.childComments != null and !comment.childComments.isEmpty()}">
                                <div th:each="reply : ${comment.childComments}" class="comment-item">
                                    <div class="comment-header">
                                        <img th:src="${reply.avatar != null ? reply.avatar : '/images/default-avatar.svg'}" alt="头像" class="comment-avatar">
                                        <div>
                                            <span class="comment-author" th:text="${reply.nickname != null ? reply.nickname : '匿名用户'}">用户名</span>
                                            <span class="comment-time" th:text="${#temporals.format(reply.createTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                                        </div>
                                    </div>
                                    <div class="comment-content" th:text="${reply.content}">回复内容</div>
                                </div>
                            </div>
                        </li>
                        
                        <li th:if="${#lists.isEmpty(comments)}" class="empty-state" style="padding: 30px;">
                            <i class="fas fa-comment-slash"></i>
                            <p>暂无评论，快来抢沙发吧~</p>
                        </li>
                    </ul>
                </section>
            </div>
            
            <aside th:replace="fragments/sidebar :: sidebar"></aside>
        </div>
    </div>
    
    <footer th:replace="fragments/footer :: footer"></footer>
    <th:block th:replace="fragments/footer :: scripts"></th:block>
    
    <script th:inline="javascript">
        const articleId = /*[[${article.id}]]*/ 0;
        let isLiked = false;
        let replyToId = null;
        
        // 检查点赞状态
        async function checkLikeStatus() {
            if (!Utils.isLoggedIn()) return;
            try {
                const result = await Api.get(`/api/articles/${articleId}/like/status`);
                if (result.liked) {
                    isLiked = true;
                    document.getElementById('like-btn').classList.add('liked');
                }
            } catch (e) {
                console.error('检查点赞状态失败:', e);
            }
        }
        
        // 点赞/取消点赞
        async function toggleLike() {
            if (!Utils.isLoggedIn()) {
                Toast.warning('请先登录');
                return;
            }
            
            try {
                const result = await Api.post(`/api/articles/${articleId}/like`);
                if (result.success) {
                    isLiked = result.liked;
                    document.getElementById('like-count').textContent = result.likeCount;
                    const btn = document.getElementById('like-btn');
                    if (isLiked) {
                        btn.classList.add('liked');
                        Toast.success('点赞成功');
                    } else {
                        btn.classList.remove('liked');
                        Toast.success('已取消点赞');
                    }
                }
            } catch (e) {
                Toast.error('操作失败');
            }
        }
        
        // 分享文章
        function shareArticle() {
            const url = window.location.href;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(() => {
                    Toast.success('链接已复制到剪贴板');
                });
            } else {
                Toast.warning('请手动复制链接');
            }
        }
        
        // 回复评论
        function replyTo(commentId, nickname) {
            replyToId = commentId;
            const textarea = document.getElementById('comment-content');
            textarea.placeholder = `回复 @${nickname}：`;
            textarea.focus();
        }
        
        // 提交评论
        async function submitComment() {
            if (!Utils.isLoggedIn()) {
                Toast.warning('请先登录');
                return;
            }
            
            const content = document.getElementById('comment-content').value.trim();
            if (!content) {
                Toast.warning('请输入评论内容');
                return;
            }
            
            const user = Utils.getUser();
            const comment = {
                articleId: articleId,
                userId: user.id,
                nickname: user.nickname || user.username,
                avatar: user.avatar,
                content: content,
                parentId: replyToId
            };
            
            try {
                const result = await Api.post('/api/comments', comment);
                if (result.success) {
                    Toast.success('评论成功，等待审核');
                    document.getElementById('comment-content').value = '';
                    replyToId = null;
                    document.getElementById('comment-content').placeholder = '写下你的评论...';
                } else {
                    Toast.error(result.message || '评论失败');
                }
            } catch (e) {
                Toast.error('评论失败');
            }
        }
        
        // 页面加载时检查点赞状态
        document.addEventListener('DOMContentLoaded', checkLikeStatus);
    </script>
</body>
</html>
